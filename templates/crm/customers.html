{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Customers" %} | {% trans "CRM System" %}{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="mb-4">{% trans "Customers" %}</h1>
    <div class="mb-4">
        <a href="{% url 'crm:customer_create' %}" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>{% trans "Add Customer" %}
        </a>
    </div>
    <div class="card">
        <div class="card-body">
            <iframe src="{% url 'crm:customer_list' %}" style="width: 100%; height: 600px; border: none;"></iframe>
        </div>
    </div>
</div>
{% endblock %}
