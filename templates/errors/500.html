{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container fade-in">
    <div class="row justify-content-center min-vh-75 align-items-center py-5">
        <div class="col-md-6 text-center">
            <div class="error-page">
                <h1 class="display-1 text-danger mb-4">500</h1>
                <h2 class="h3 mb-4">{% trans "Internal Server Error" %}</h2>
                <p class="text-muted mb-4">{% trans "Something went wrong on our end. Please try again later or contact support if the problem persists." %}</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'home' %}" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>{% trans "Back to Home" %}
                    </a>
                    <a href="{% url 'contact' %}" class="btn btn-outline-primary">
                        <i class="fas fa-envelope me-2"></i>{% trans "Contact Support" %}
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
