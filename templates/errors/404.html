{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container fade-in">
    <div class="row justify-content-center min-vh-75 align-items-center py-5">
        <div class="col-md-6 text-center">
            <div class="error-page">
                <h1 class="display-1 text-primary mb-4">404</h1>
                <h2 class="h3 mb-4">{% trans "Page Not Found" %}</h2>
                <p class="text-muted mb-4">{% trans "The page you are looking for might have been removed, had its name changed, or is temporarily unavailable." %}</p>
                <a href="{% url 'home' %}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i>{% trans "Back to Home" %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
